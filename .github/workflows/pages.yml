name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    # Don't spend a build + deploy on a push that cannot change the built site.
    # Everything NOT listed here still triggers — including tests/, which gate the deploy,
    # and src/changelog.js, which is site content. Deliberately conservative: the cost of
    # an unnecessary run is a few minutes, the cost of a missed one is a stale deploy.
    paths-ignore:
      - '**/*.md'
      - '.vscode/**'
      - '.codegraph/**'
      - '.gitignore'
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel a run that is already publishing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
