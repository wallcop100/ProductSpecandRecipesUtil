name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Safety net so node-gyp can find the MSVC toolchain if any native module
      # has to compile on Windows (better-sqlite3 normally uses a prebuilt binary).
      - name: Setup Windows build tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Skip dependency build scripts so better-sqlite3 is NOT compiled against the
      # host Node (no prebuilt exists for Node 24). install-app-deps below fetches
      # the Electron prebuilt instead — the only binary the packaged app needs.
      - name: Install Node deps
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python backend
        run: |
          pip install pyinstaller flask flask-cors openpyxl
          pyinstaller --onefile --name backend-server --distpath dist-python backend/app.py

      - name: Build React
        run: npm run build

      - name: Build Electron + publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run electron:build -- --config electron-builder.config.js --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}

      # Make the installers downloadable from the run page on every run, including
      # manual dry-runs that don't publish a GitHub Release.
      - name: Upload installers
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.zip
          if-no-files-found: ignore
