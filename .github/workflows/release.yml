name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Safety net so node-gyp can find the MSVC toolchain if any native module
      # has to compile on Windows (better-sqlite3 normally uses a prebuilt binary).
      - name: Setup Windows build tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Skip dependency build scripts so better-sqlite3 is NOT compiled against the
      # host Node (no prebuilt exists for Node 24). install-app-deps below fetches
      # the Electron prebuilt instead — the only binary the packaged app needs.
      - name: Install Node deps
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python backend
        run: |
          pip install pyinstaller flask flask-cors openpyxl
          pyinstaller --onefile --name backend-server --distpath dist-python backend/app.py

      - name: Build React
        run: npm run build

      # Build the installers only — do NOT let electron-builder publish. Publishing
      # from each matrix job races on the same GitHub release and drops assets;
      # a single release job below attaches everything instead. This still
      # generates latest.yml + .blockmap (the auto-updater metadata).
      - name: Build Electron installers
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run electron:build -- --config electron-builder.config.js --publish never

      # Installers + auto-update metadata, downloadable from the run page and
      # consumed by the release job. Includes *.yml / *.blockmap so
      # electron-updater can serve updates from the published release.
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
            dist-electron/*.dmg
            dist-electron/*.dmg.blockmap
            dist-electron/*.zip
            dist-electron/*.yml
          if-no-files-found: ignore

  # Single, non-concurrent job that attaches every OS's installers + update
  # metadata to the tag's GitHub Release. Only runs for tag pushes.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.exe.blockmap
            artifacts/**/*.dmg
            artifacts/**/*.dmg.blockmap
            artifacts/**/*.zip
            artifacts/**/*.yml
          fail_on_unmatched_files: false
